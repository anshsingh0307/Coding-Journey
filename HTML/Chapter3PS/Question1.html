<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crowmato - Crow biryani at your doorstep </title>
    <style>
        /* Reset default browser styling */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* Body */
body {
    background-color: #fff5f5;
    color: #333;
    line-height: 1.6;
}

/* Header */
header {
    background-color: #d62828;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
}

/* Logo */
header div:first-child {
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* Navigation links */
header a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: 500;
    transition: 0.3s;
}

/* Hover effect */
header a:hover {
    color: #ffd6d6;
}

/* Main section */
main {
    text-align: center;
    padding: 80px 20px;
}

/* Main heading */
main div {
    font-size: 36px;
    font-weight: bold;
    color: #d62828;
    margin-bottom: 15px;
}

/* Paragraph */
main p {
    font-size: 18px;
    color: #555;
}

/* Footer */
footer {
    background-color: #d62828;
    color: white;
    text-align: center;
    padding: 15px;
    position: fixed;
    bottom: 0;
    width: 100%;
}
    </style>
</head>
<body>
    <header>
        <div>
            Crowmato
        </div>
        <div>
            <a href="/home">Home</a>
             <a href="/about">About</a>
              <a href="/contact">Contact</a>
        </div>
    </header>

    <main>
        <div>
            Order food any time anywhere
        </div>
        <p>
            Experience fast & easy online ordering on the Crowmato app
        </p>
    </main>
    <footer>
        Copyright Crowmato All Rights Reserved
    </footer>
</body>
</html>
